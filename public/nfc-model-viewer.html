<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NFC Model Viewer</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(147, 197, 253, 0.34), transparent 48%),
          linear-gradient(180deg, #dbeafe 0%, #eff6ff 42%, #f8fafc 100%);
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.184.0/build/three.module.js";
      import { GLTFLoader } from "https://unpkg.com/three@0.184.0/examples/jsm/loaders/GLTFLoader.js";
      import { OrbitControls } from "https://unpkg.com/three@0.184.0/examples/jsm/controls/OrbitControls.js";

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.01, 10);
      camera.position.set(0, 0.03, 0.12);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.05;
      document.body.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 2.4));

      const keyLight = new THREE.DirectionalLight(0xffffff, 2.8);
      keyLight.position.set(0.2, 0.35, 0.28);
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0x93c5fd, 1.2);
      fillLight.position.set(-0.24, 0.12, -0.2);
      scene.add(fillLight);

      const groundLight = new THREE.PointLight(0xffffff, 0.5);
      groundLight.position.set(0, -0.06, 0.05);
      scene.add(groundLight);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableZoom = false;
      controls.minPolarAngle = Math.PI / 2.6;
      controls.maxPolarAngle = Math.PI / 1.75;
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;

      const loader = new GLTFLoader();
      const root = new THREE.Group();
      scene.add(root);

      let modelGroup = null;
      let turned = false;
      let modelLoaded = false;

      loader.load("/nfc.weeks.glb", (gltf) => {
        modelGroup = new THREE.Group();
        modelGroup.add(gltf.scene);

        const box = new THREE.Box3().setFromObject(modelGroup);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        modelGroup.position.sub(center);

        const maxAxis = Math.max(size.x, size.y, size.z) || 1;
        const scale = 0.075 / maxAxis;
        modelGroup.scale.setScalar(scale);

        root.add(modelGroup);
        modelLoaded = true;
      });

      renderer.domElement.addEventListener("click", () => {
        turned = !turned;
      });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const clock = new THREE.Clock();

      function tick() {
        const elapsed = clock.getElapsedTime();

        if (modelGroup && modelLoaded) {
          const targetY = turned ? Math.PI : 0;
          root.rotation.y = THREE.MathUtils.lerp(root.rotation.y, targetY, 0.08);
          root.rotation.z = Math.sin(elapsed * 1.4) * 0.04;
          root.position.y = Math.sin(elapsed * 1.8) * 0.002;
        }

        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(tick);
      }

      tick();
    </script>
  </body>
</html>
